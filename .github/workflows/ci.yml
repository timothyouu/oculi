name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    name: Baseline verifiers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # No .nvmrc in this repo; Node 20 matches the project's target runtime.
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Build
        run: npx next build
        # No env vars are set here: NEXT_PUBLIC_SUPABASE_URL/ANON_KEY and
        # NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN are all read lazily (lib/supabase.ts,
        # components/mapbox-map.tsx) and gate their own fallback behavior rather
        # than being required at build/module-evaluation time. Verified locally
        # that `npx next build` succeeds with no env vars present.

      - name: Lint
        run: npx next lint
        # `next lint`'s default ESLint config only fails the process on lint
        # errors, not warnings. This repo has known <img> "no-img-element"
        # warnings (tracked, not yet fixed) that must keep passing CI.

      - name: Verify catalog integrity (local seed, credential-free)
        run: npx tsx scripts/verify-catalog-integrity.mts --local
        # scripts/verify-db-sync.mts (a data.ts <-> DB byte-equality checker)
        # was retired (docs/demo-to-product-implementation.md item 10, step 3
        # -- Tim-approved spec change): its premise stopped holding once the
        # database became the source of truth for live catalog content
        # instead of lib/data.ts. scripts/verify-catalog-integrity.mts
        # replaces it. Run with `--local`, it validates the bundled seed in
        # lib/data.ts only (every payload parses via lib/catalog-validation.ts,
        # every place satisfies the lib/place-taxonomy.ts taxonomy invariants)
        # -- credential-free and network-free, so it's safe for CI. The same
        # script's default (remote) mode queries the live
        # oculi_demo_catalog_items table via the Supabase REST API using
        # NEXT_PUBLIC_SUPABASE_URL/NEXT_PUBLIC_SUPABASE_ANON_KEY from the
        # environment; that mode requires real credentials and stays a
        # manual/local step, not run here.
